name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Quality gates on Linux (fast, no GUI bundle).
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libxdo-dev librsvg2-dev \
            libayatana-appindicator3-dev curl wget file

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Frontend tests
        run: pnpm test

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --workspace --locked

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # Portable single-file .exe (no installer). WebView2 is preinstalled on the runner.
  windows-portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Build portable exe
        run: pnpm tauri build

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: PoprawiaczTekstu-portable-windows
          path: src-tauri/target/release/poprawiacz.exe
          if-no-files-found: error
